name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    uses: ./.github/workflows/build-macos.yml
    secrets: inherit

  build-windows:
    uses: ./.github/workflows/build-windows.yml
    secrets: inherit

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -R artifacts

      - name: Rename to stable filenames
        run: |
          mkdir release

          find artifacts/macos-universal -name '*.dmg' -exec cp {} release/Hot-Symbols-universal.dmg \;
          find artifacts/macos-apple-silicon -name '*.dmg' -exec cp {} release/Hot-Symbols-apple-silicon.dmg \;
          find artifacts/macos-intel -name '*.dmg' -exec cp {} release/Hot-Symbols-intel.dmg \;

          find artifacts/windows-x86_64 -name '*.exe' -exec cp {} release/Hot-Symbols-x64.exe \;
          find artifacts/windows-arm64 -name '*.exe' -exec cp {} release/Hot-Symbols-arm64.exe \;

          ls -la release/

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
