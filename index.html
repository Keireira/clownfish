<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hot Symbols</title>
  <script>
    // Detect glass support + apply theme before first paint
    (function(){
      if(window.__TAURI_INTERNALS__){
        var p=navigator.platform;
        if(p.indexOf("Mac")===0||p.indexOf("Win")===0){
          document.documentElement.classList.add("glass");
        }
      }
      var t=localStorage.getItem("theme");
      if(t==="light"||(t==="auto"&&window.matchMedia("(prefers-color-scheme: light)").matches)){
        document.documentElement.setAttribute("data-theme","light");
      }
    })();
  </script>
  <style>
    html,body{margin:0;padding:0;}
    html,body{background:#1e1e22;}
    html[data-theme="light"],html[data-theme="light"] body{background:#f0f0f2;}
    html.glass,html.glass body{background:transparent;}
    html.glass{clip-path:inset(0 round 14px);}
  </style>
</head>
<body>
  <div id="root"><div id="__loading" style="background:rgba(10,10,14,0.9);color:#f0f0f0;padding:20px;font-family:sans-serif;font-size:14px;border-radius:12px;width:420px;">Loading...</div></div>
  <div id="__debug" style="position:fixed;top:0;left:0;right:0;background:#ff0000;color:#fff;font-size:12px;padding:8px;z-index:999999;font-family:monospace;display:none;white-space:pre-wrap;word-break:break-all;"></div>
  <script>
    // Catch any JS errors and display them visually (Tauri webview has no visible console)
    window.onerror = function(msg, url, line, col, err) {
      var d = document.getElementById('__debug');
      d.style.display = 'block';
      d.textContent = 'ERROR: ' + msg + '\n' + (url||'') + ':' + line + ':' + col + '\n' + (err && err.stack || '');
    };
    window.addEventListener('unhandledrejection', function(e) {
      var d = document.getElementById('__debug');
      d.style.display = 'block';
      d.textContent = 'UNHANDLED REJECTION: ' + (e.reason && e.reason.stack || e.reason || e);
    });
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
